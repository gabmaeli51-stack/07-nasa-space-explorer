<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

  <div class="container">

    <header class="site-header">

      <img
        src="img/nasa-worm-logo.png"
        alt="NASA Logo"
        class="logo"
      >

      <div class="hero-text">

        <h1>NASA Space Explorer</h1>

        <p class="subtitle">
          Explore breathtaking Astronomy Pictures of the Day
          from NASA's archives.
        </p>

      </div>

    </header>

    <div class="filters">

      <input type="date" id="startDate">

      <input type="date" id="endDate">

      <button id="exploreBtn">
        🚀 Begin Mission
      </button>

    </div>

    
    <section id="spaceFact" class="space-fact">

    </section>

    
    <div id="loading" class="loading hidden">
      🚀 Launching mission...
    </div>

    
    <div id="gallery" class="gallery">

      <div class="placeholder">

        <div class="placeholder-icon">
          🔭
        </div>

        <p>
          Select a date range and click "Begin Mission"
          to explore the cosmos!
        </p>

      </div>

    </div>

  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">

    <div class="modal-content">

      <span id="closeModal">&times;</span>

      <img id="modalImage">

      <h2 id="modalTitle"></h2>

      <p id="modalDate"></p>

      <p id="modalExplanation"></p>

    </div>

  </div>

<footer>

Powered by NASA APOD

Made with ❤️ and JavaScript

</footer>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
